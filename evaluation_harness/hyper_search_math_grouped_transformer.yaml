# Hyperparameter search configuration for Grouped Transformer method on math evaluation
# This config specifies the hyperparameter grid for grouped transformer method

# Base config to use for each run
base_config: config_hyps_math_grouped_transformer

# Method to search (must match method name in base config)
method_name: grouped_transformer

# WandB configuration
wandb:
  project: cactts-hyps-math-grouped-transformer
  entity: null  # Set your wandb entity if needed
  enabled: true

# CUDA device to use
cuda_device: 0

# Hyperparameter grid
# Each parameter should be a list of values to try
hyperparameters:
  lr: [0.005, 0.001, 0.0005, 0.0001]
  
  dropout: [0.0, 0.1, 0.2]
  
  weight_decay: [0.0, 0.0001, 0.001]
  
  loss_type: [hinge, bce]
  
  early_stop_metric: [val_acc]
  
  # Uncomment to search over these parameters
  # d_model: [64, 128, 256]
  # num_layers: [2, 3, 4]
  # batch_problems: [4, 8, 16]
  # margin: [0.5, 1.0, 2.0]  # Only for hinge loss

# Search strategy
search_strategy: grid  # Options: grid, random
max_trials: null  # Set to limit number of trials (null = try all combinations)
random_seed: 42
