# Hyperparameter search configuration for CLS Attention method on code evaluation
# This config specifies the hyperparameter grid for attention-based method

# Base config to use for each run
base_config: config_hyps_code_attention

# Method to search (must match method name in base config)
method_name: attention_matrix

# WandB configuration
wandb:
  project: cactts-hyps-code-attention2
  entity: null  # Set your wandb entity if needed
  enabled: true

# CUDA device to use
cuda_device: 0

# Hyperparameter grid
# Each parameter should be a list of values to try
hyperparameters:
  stage1_lr: [0.0005, 0.001]
  stage2_lr: [0.0005, 0.001]

  stage1_weight_decay: [0.0001, 0.001]
  stage2_weight_decay: [0.0001, 0.001]
  
  dropout: [0.0, 0.1, 0.2]
  
  loss_type: [bce]
    
  top_k: [50, 20]  # Number of top attention positions to extract
 
  # Uncomment to search over these parameters
  # d_model: [64, 128, 256]
  # num_layers: [2, 3, 4]
  # batch_problems: [4, 8, 16]
  # margin: [0.5, 1.0, 2.0]  # Only for hinge loss

# Search strategy
search_strategy: grid  # Options: grid, random
max_trials: null  # Set to limit number of trials (null = try all combinations)
random_seed: 42
