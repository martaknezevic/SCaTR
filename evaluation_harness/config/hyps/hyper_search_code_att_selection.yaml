# Hyperparameter search configuration for Attention Selection method on code evaluation
# This config specifies the hyperparameter grid for attention-based token selection

# Base config to use for each run
base_config: config_hyps_code_attention_selection

# Method to search (must match method name in base config)
method_name: attention_selection

# WandB configuration
wandb:
  project: cactts-hyps-code-attention-selection
  entity: null  # Set your wandb entity if needed
  enabled: true

# CUDA device to use
cuda_device: 0

# Hyperparameter grid
# Each parameter should be a list of values to try
hyperparameters:
  lr: [0.0001, 0.0005, 0.001,]
  weight_decay: [0.0, 0.0001, 0.001, 0.01]
  dropout: [0.0, 0.1, 0.2]
  
  # Uncomment to also search over these parameters
  k: [10, 20, 50]  # Number of top tokens to select
  # temperature: [0.5, 1.0, 2.0]  # Temperature for attention softmax
  # d_model: [64, 128, 256]
  # nhead: [2, 4, 8]
  # loss_type: ["hinge", "bce"]
  # sparsity_lambda: [0.0, 0.001, 0.01]

# Search strategy
search_strategy: grid  # Options: grid, random
max_trials: null  # Set to limit number of trials (null = try all combinations)
random_seed: 42
