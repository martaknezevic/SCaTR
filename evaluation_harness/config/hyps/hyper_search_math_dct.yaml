# Hyperparameter search configuration for DCT-NN method on math evaluation
# This config specifies the hyperparameter grid for DCT neural network method

# Base config to use for each run
base_config: config_hyps_math_dct

# Method to search (must match method name in base config)
method_name: dct_nn

# WandB configuration
wandb:
  project: cactts-hyps-math-dct2
  entity: null  # Set your wandb entity if needed
  enabled: true

# CUDA device to use
cuda_device: 0

# Hyperparameter grid
# Each parameter should be a list of values to try
hyperparameters:
  lr: [0.005, 0.001, 0.0005, 0.0001]
  
  dropout: [0.0, 0.1, 0.2]
  
  weight_decay: [0.0, 0.0001, 0.001, 0.01]
  
  loss_type: [hinge, bce]
  
  early_stop_metric: [val_acc]
  
  # Uncomment to search over these parameters
  # K: [64, 128, 256]  # Number of DCT coefficients
  # hidden_dim: [64, 128, 256]
  # batch_problems: [4, 8, 16]
  # margin: [0.5, 1.0, 2.0]  # Only for hinge loss
  # normalize_dct: [true, false]

# Search strategy
search_strategy: grid  # Options: grid, random
max_trials: null  # Set to limit number of trials (null = try all combinations)
random_seed: 42
