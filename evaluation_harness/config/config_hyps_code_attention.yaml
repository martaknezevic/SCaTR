# Base configuration for hyperparameter search
# This config should have exactly ONE method to tune

# Data configuration
data:
  train_data_path: "/efs/cactts/data/Qwen8b/kodcode/turn1"
  external_test_data_paths: 
    - "/efs/cactts/data/Qwen8b/humaneval_v2/turn1"
  
  num_problems: null
  num_workers: 32
  num_choice_workers: 8
  use_cache: true
  cache_dir: "cache"
  subsample_size: null
  
  num_train_problems: 700
  num_val_problems: 150
  num_test_problems: 150
  random_seed: 42
  
  tail_tokens: 2048

# Single method to tune (hyperparameters will be overridden by search script)
methods:
  - name: attention_matrix
    params:
      # Architecture parameters
      hidden_dim: 128
      nheads: 4
      num_layers: 2
      dropout: 0.1  # Will be overridden
      top_k: 10  # Will be overridden - number of top attention positions to extract
      metric_hidden_dim: 64
      
      # Stage 1 training parameters
      stage1_lr: 0.001  # Will be overridden
      stage1_weight_decay: 0.0001  # Will be overridden
      stage1_epochs: 50
      stage1_patience: 10
      stage1_early_stopping_metric: "val_acc"
      
      # Stage 2 training parameters
      stage2_lr: 0.0005  # Will be overridden
      stage2_weight_decay: 0.0001  # Will be overridden
      stage2_epochs: 50
      stage2_patience: 10
      stage2_early_stopping_metric: "val_acc"
      
      # Common parameters
      batch_size: 32
      loss_type: "bce"  # Will be overridden - 'bce' or 'hinge'
      margin: 1.0  # Margin for hinge loss
      tail_tokens: 2048
      device: "cuda"

# Output configuration
output:
  base_dir: "outputs/hyper_search"
  save_predictions: true
  save_models: true
  save_metrics: true

# Evaluation settings
evaluation: "code"
device: "cuda"

# WandB configuration (will be overridden by search script)
wandb:
  enabled: true
  project: "cactts-hyps-code-attention"
  entity: null
