# Configuration for CLS attention-based top-k metric method
# Two-stage training: transformer encoder + metric learner on top-k attention

# Data configuration
data:
  # Path to training data - will be split into train/val/test
  train_data_path: "/efs/cactts/data/Qwen8b/kodcode/turn1"
  
  # Path(s) to external test data for final evaluation
  # Can be a single path (string) or list of paths
  external_test_data_paths: 
    - "/efs/cactts/data/Qwen8b/humaneval_v2/turn1"
    # - "/efs/cactts/data/Qwen8b/aime/GY2233_AIME-2024-2025/turn1/2025"
  
  # Data loading parameters
  num_problems: null  # Load all problems (or specify a number to limit)
  num_workers: 32  # Parallel workers for data loading
  num_choice_workers: 8  # Workers for processing choices
  use_cache: true  # Use cached data if available
  cache_dir: "cache"
  subsample_size: null  # Subsample rollouts per problem (or null for all)
  
  # Train/val/test split from train_data_path
  num_train_problems: 700  # Number of problems for training
  num_val_problems: 150  # Number of problems for validation
  num_test_problems: 150  # Number of problems for internal test evaluation
  random_seed: 42
  
  # Feature extraction
  tail_tokens: 2048  # Number of tail tokens for features


methods:
  # CLS attention top-k method with default parameters
  - name: attention_matrix
    params:
      # Architecture
      hidden_dim: 128
      num_heads: 4
      num_layers: 2
      dropout: 0.1
      top_k: 10  # Number of top attended tokens
      metric_hidden_dim: 64
      
      # Stage 1: Transformer training
      stage1_lr: 0.001
      stage1_weight_decay: 0.0001
      stage1_epochs: 1
      stage1_patience: 3
      stage1_early_stopping_metric: "val_acc"  # 'val_acc' or 'val_loss'
      
      # Stage 2: Metric learner training
      stage2_lr: 0.0005
      stage2_weight_decay: 0.0001
      stage2_epochs: 10
      stage2_patience: 3
      stage2_early_stopping_metric: "val_acc"  # 'val_acc' or 'val_loss'
      
      # Common parameters
      batch_size: 32
  
  # CLS attention with larger model
  #- name: cls_attention_topk_metric
  #  params:
  #    # Architecture
  #    hidden_dim: 256
  #    num_heads: 8
  #    num_layers: 3
  #    dropout: 0.2
  #    top_k: 20
  #    metric_hidden_dim: 128
  #    
  #    # Stage 1: Transformer training
  #    stage1_lr: 0.0005
  #    stage1_weight_decay: 0.0001
  #    stage1_epochs: 15
  #    stage1_patience: 5
  #    stage1_early_stopping_metric: "val_loss"  # 'val_acc' or 'val_loss'
  #    
  #    # Stage 2: Metric learner training
  #    stage2_lr: 0.0003
  #    stage2_weight_decay: 0.0001
  #    stage2_epochs: 15
  #    stage2_patience: 5
  #    stage2_early_stopping_metric: "val_loss"  # 'val_acc' or 'val_loss'
  #    
  #    # Common parameters
  #    batch_size: 16
  
  # Baseline for comparison
  - name: uniform
    params: {}

output:
  base_dir: "outputs/cls_attention_evaluation"
  save_predictions: true
  save_models: true
  save_metrics: true

evaluation: "math"
device: "cuda"
