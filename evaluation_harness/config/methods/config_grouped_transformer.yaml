# Configuration for testing Grouped Transformer method
# Uses windowed averaging to reduce sequence length before transformer processing

# Data configuration
data:
  # Path to training data - will be split into train/val/test
  train_data_path: "/efs/cactts/data/Qwen8b/gsm8k/turn1"
  
  # Path(s) to external test data for final evaluation
  # Can be a single path (string) or list of paths
  external_test_data_paths: 
    - "/efs/cactts/data/Qwen8b/math500/turn1"
  
  # Data loading parameters
  num_problems: null  # Load all problems (or specify a number to limit)
  num_workers: 32  # Parallel workers for data loading
  num_choice_workers: 8  # Workers for processing choices
  use_cache: true  # Use cached data if available
  cache_dir: "cache"
  subsample_size: null  # Subsample rollouts per problem (or null for all)
  
  # Train/val/test split from train_data_path
  num_train_problems: 700  # Number of problems for training
  num_val_problems: 150  # Number of problems for validation
  num_test_problems: 150  # Number of problems for internal test evaluation
  random_seed: 42
  
  # Feature extraction
  tail_tokens: 2048  # Number of tail tokens for features

# List of methods to evaluate
methods:
  # Baseline methods for comparison
  - name: random
    params:
      num_trials: 10
  
  - name: oracle
    params: {}
  
  - name: uniform
    params: {}
  
  # Grouped Transformer method with windowed averaging
  - name: grouped_transformer
    params:
      d_model: 128  # Transformer embedding dimension
      nhead: 4  # Number of attention heads
      num_layers: 2  # Number of transformer layers
      mlp_hidden: 64  # Hidden dimension for final MLP
      dropout: 0.1  # Dropout rate
      num_epochs: 100  # Number of training epochs
      lr: 0.001  # Learning rate
      batch_problems: 8  # Number of problems per gradient update
      margin: 1.0  # Margin for hinge loss
      attention_l1_weight: 0.01  # Weight for attention sparsity regularization
      patience: 5  # Early stopping patience
      early_stop_metric: "val_loss"  # Metric for early stopping: "val_acc" or "val_loss"
      use_projection: true  # Use linear projection for input
      tail_tokens: 2048  # Max sequence length before grouping
      window_size: 128  # Window size for grouping/averaging logprobs
      seed: 42  # Random seed for weight initialization
      loss_type: "hinge"  # Loss type: "hinge" or "bce"
      use_weighted_loss: false  # Use weighted loss based on pos/neg ratio

# Output configuration
output:
  base_dir: "outputs/evaluation"  # Base directory for all outputs
  save_predictions: true  # Save predictions to JSONL files
  save_models: true  # Save trained models
  save_metrics: true  # Save evaluation metrics

# Evaluation settings
evaluation: "math"  # Type of evaluation: "math" or "code"
device: "cuda"  # Device for training: "cuda" or "cpu"
