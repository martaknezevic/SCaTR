# Example evaluation harness configuration
# This config demonstrates how to evaluate multiple methods with different parameters

# Data configuration
data:
  # Path to training data - will be split into train/val/test
  train_data_path: "/efs/cactts/data/Qwen8b/gsm8k/turn1"
  
  # Path(s) to external test data for final evaluation
  # Can be a single path (string) or list of paths
  external_test_data_paths: 
    - "/efs/cactts/data/Qwen8b/math500/turn1"
    # - "/efs/cactts/data/Qwen8b/aime/GY2233_AIME-2024-2025/turn1/2025"
  
  # Data loading parameters
  num_problems: null  # Load all problems (or specify a number to limit)
  num_workers: 32  # Parallel workers for data loading
  num_choice_workers: 8  # Workers for processing choices
  use_cache: true  # Use cached data if available
  cache_dir: "cache"
  subsample_size: null  # Subsample rollouts per problem (or null for all)
  
  # Train/val/test split from train_data_path
  num_train_problems: 700  # Number of problems for training
  num_val_problems: 150  # Number of problems for validation
  num_test_problems: 150  # Number of problems for internal test evaluation
  random_seed: 42
  
  # Feature extraction
  tail_tokens: 2048  # Number of tail tokens for features

# List of methods to evaluate
methods:
  # Baseline: Random selection
  - name: random
    params:
      num_trials: 10  # Number of random trials to average over
  
  - name: oracle
    params: {}
  
  - name: uniform
    params: {}
  
