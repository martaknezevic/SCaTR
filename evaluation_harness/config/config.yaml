# Output configuration
output:
  base_dir: "outputs/evaluation"  # Base directory for all outputs
  save_predictions: true  # Save predictions to JSONL files
  save_models: true  # Save trained models
  save_metrics: true  # Save evaluation metrics

# Evaluation settings
evaluation: "math"  # Type of evaluation: "math" or "code"
device: "cuda"  # Device for training: "cuda" or "cpu"
